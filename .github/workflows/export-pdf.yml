name: Tự động xuất Markdown sang PDF

on:
  push:
    branches:
      - main # Chạy tự động khi bạn push code lên nhánh main (sửa thành master nếu kho của bạn dùng master)

jobs:
  convert-to-pdf:
    runs-on: ubuntu-latest
    steps:
      # Bước 1: Lấy toàn bộ code/file từ kho lưu trữ về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Sử dụng công cụ Markdown to PDF để chuyển đổi
      - name: Convert Markdown to PDF
        uses: baileyjm02/markdown-to-pdf@v1.2.0
        with:
          # Thay 'README.md' bằng tên file bạn muốn xuất. 
          # Nếu muốn xuất tất cả file .md, bạn có thể để trống hoặc dùng '*.md'
          input_path: '*.md'
          output_dir: pdf-output
          # Tùy chỉnh giao diện PDF (giống giao diện GitHub)
          build_html: false

      # Bước 3: Đẩy file PDF vừa tạo ngược lại lên một nhánh khác (ví dụ: pdf-artifacts) để bạn tải về
      - name: Upload PDF to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: markdown-pdf
          path: pdf-output/
